 특수관계가 아닌 당사자와의 동일하거나 유사한 거래의 조건과 비교함\n\n2. 해당 거래에 대한 시장가치의 결정 및 시장계약조건의 확인을 위하여 외부전문가를 활용함\n\n3. 해당 거래의 조건을 공개시장의 대체로 유사한 거래에 대하여 알려진 시장조건과 비교함","keywords":["특수관계","아닌","동일","유사","거래","비교","외부전문가","공개시장","조건","비교"],"unit":"7.2"},{"title":"특수관계자 거래가 독립된 당사자간 거래에 통용되는 조건과 동등한 조건으로 수행되었다는 경영진의 주장 입수-감사인이 경영진주장을 평가하는 절차","criteria":"1. 해당 주장을 뒷받침하기 위한 경영진의 절차가 적합한지 고려함\n\n2. 해당 주장을 뒷받침하는 내/외부 데이터의 원천을 검증하고, 데이터의 정확성, 완전성 및 관련성을 결정하기 위해 이를 테스트함\n\n3. 해당 주장의 근거가 되는 유의적 가정의 합리성을 평가함","keywords":["경영진","절차","적합","데이터","원천","검증","테스트","유의적 가정","합리성"],"unit":"7.2"},{"title":"감사인측 전문가의 정의","criteria":"감사인측 전문가란 회계나 감사 외의 분야에서 전문성을 보유하고, 해당분야에서 감사인이 충분하고 적합한 감사증거를 입수하는 데 도움을 줄 수 있도록 해당 분야에서의 업무가 감사인에 의해 활용되는 개인 또는 조직을 말한다. 감사인측 전문가는 감사인의 내부전문가이거나 감사인의 외부전문가일 수 있다.","keywords":["회계","감사","외의 분야","전문성","내부","외부"],"unit":"7.2"},{"title":"감사인이 감사인측 전문가 활용을 결정할 때 고려할 사항-일반적인 경우 고려사항","criteria":"1. 경영진이 재무제표를 작성할 때 경영진측 전문가를 활용하였는지 여부\n\n2. 해당 사항의 복잡성 등 관련 사항의 성격과 유의성\n\n3. 해당 사항에 포함된 중요왜곡표시위험\n\n4. 해당 사항과 관련된 전문가의 업무에 대한 감사인의 지식과 경험 등 식별된 위험에 대응하는 감사절차의 예상되는 성격, 그리고 감사증거에 대한 대체적 원천의 이용가능성","keywords":["경영진","전문가","여부","성격","유의성","중요왜곡표시위험","지식","경험","대체적 원천","이용가능성"],"unit":"7.2"},{"title":"감사인이 감사인측 전문가 활용을 결정할 때 고려할 사항-경영진이 경영진측 전문가를 활용하여 재무제표를 작성하였을 경우 고려사항","criteria":"1. 경영진측 전문가의 업무의 성격, 범위, 목적\n\n2. 경영진측 전문가가 기업에 고용되었는지 또는 관련 서비스를 제공하도록 기업과 계약된 계약당사자인지 여부\n\n3. 경영진이 경영진측 전문가의 업무에 대하여 통제를 하거나 영향을 줄 수 있는 정도\n\n4. 경영진측 전문가의 적격성과 역량\n\n5. 경영진측 전문가가 기술적인 수행기준 또는 기타 전문직 요구사항이나 소속 산업의 요구사항을 준수하여야 하는지 여부\n\n6. 경영진측 전문가의 업무에 대한 기업 내부의 통제","keywords":["성격","범위","목적","기업","고용","경영진","통제","영향","적격성","역량","기준","요구사항","내부","통제"],"unit":"7.2"},{"title":"외부 전문가를 활용할 경우 감사절차의 성격, 시기 및 범위","criteria":"1. 전문가의 업무가 관련된 사항의 성격\n\n2. 전문가의 업무가 관련된 사항에서의 중요왜곡표시위험\n\n3. 감사 관점에서 해당 전문가의 업무가 가지는 유의성\n\n4. 해당 전문가가 이전에 수행한 업무에 대한 감사인의 지식과 경험\n\n5. 해당 전문가가 감사인이 속한 회계법인의 품질관리정책과 절차의 적용대상인지 여부","keywords":["성격","중요왜곡표시위험","유의성","지식","경험","품질관리정책"],"unit":"7.2"},{"title":"감사인측 전문가의 적격성, 역량 및 객관성 관련 정보의 원천","criteria":"1. 감사인측 전문가의 과거 업무에 대한 개인적 경험\n\n2. 감사인측 전문가와의 토의\n\n3. 해당 감사인측 전문가의 업무에 익숙한 타감사인 또는 다른 사람들과의 토의\n\n4. 해당 전문가의 관련 자격, 전문직 단체나 협회의 회원, 개업면허 또는 기타 형태의 외부적 공인에 대한 감사인의 지식\n\n5. 해당 전문가가 저술한 문헌이나 저서\n\n6. 감사인이 속한 회계법인의 품질관리정책과 절차","keywords":["경험","토의","다른 사람","토의","자격","저술","품질관리정책"],"unit":"7.2"},{"title":"감사인측 외부전문가의 객관성 평가 시 관련 절차","criteria":"1. 기업과 감사인측 외부전문가 간에 전문가의 객관성에 영향을 미칠 수 있는 알려진 이해 또는 관계들에 대하여 기업에 질문함\n\n2. 적용가능한 안전장치에 대하여 해당 전문가와 토의하고, 그러한 안전장치가 위협을 수용가능한 수준으로 감소시키는 데 적절한지 여부를 평가함\n\n3. 감사인은 경우에 따라 감사인측 외부전문가가 알고 있는 기업과의 이해 또는 관계들에 대하여 감사인측 전문가로부터 서면진술을 입수하는 것이 적합할 수도 있다","keywords":["객관성","영향","관계","질문","안전장치","토의","평가","서면진술"],"unit":"7.2"},{"title":"감사인이 감사인측 전문가의 해당 분야를 이해하는 목적은 무엇인가?","criteria":"1. 감사목적을 위해 감사인측 전문가 업무의 성격, 범위, 및 목적을 결정함\n\n2. 감사목적을 위해 감사인측 전문가 업무의 적합성을 평가함","keywords":["성격","범위","목적","결정","업무","적합성","평가"],"unit":"7.2"},{"title":"감사인측 전문가와 합의할 사항","criteria":"1. 감사인측 전문가 업무의 성격, 범위 및 목적\n\n2. 감사인과 감사인측 전문가 각자의 역할과 책임\n\n3. 감사인측 전문가가 작성하는 보고서의 형태 등 감사인과 감사인측 전문가 간 커뮤니케이션의 성격, 시기 및 범위\n\n4. 감사인측 전문가가 비밀유지 요구사항을 준수할 필요성","keywords":["성격","범위","목적","각자","역할","책임","커뮤니케이션","비밀유지"],"unit":"7.2"},{"title":"감사인측 전문가가 수행한 업무가 감사목적상 적합한지 여부를 평가할 때 고려할 사항","criteria":"1. 감사인측 전문가가 발견한 사항이나 결론의 관련성과 합리성 및 다른 감사증거와의 일관성\n\n2. 감사인측 전문가의 업무가 유의적인 가정과 방법을 수반하고 있다면 그 상황에서 그러한 가정과 방법의 관련성과 합리성\n\n3. 감사인측 전문가의 업무에 유의적인 원천데이터의 사용이 수반된다면 그러한 원천데이터의 관련성과 완전성 및 합리성","keywords":["관련성","합리성","일관성","가정","방법","관련성","합리성","데이터","관련성","완전성","합리성"],"unit":"7.2"},{"title":"감사인측 전문가가 수행한 업무가 부적합할 경우","criteria":"1. 감사인측 전문가가 수행한 업무가 부적합할 경우 감사절차\n1.1 해당 감사인측 전문가가 수행할 후속업무의 성격과 범위에 대하여 해당 전문가와 합의\n1.2 해당 상황에 적합한 추가적인 감사절차를 수행(감사인이 직접 수행하거나 타 전문가를 추가로 활용하는 것을 포함)\n\n2. 감사보고\n2.1 추가절차로 충분하고 적합한 감사증거를 수집하였다면 적정의견\n2.2 추가절차로도 충분하고 적합한 감사증거를 수집하지 못하였다면 감사범위제한(한정의견 or 의견거절)","keywords":["후속업무","성격","범위","합의","추가","절차","충분","적합","감사증거","적정","범위제한"],"unit":"7.2"},{"title":"감사인은 법규상 요구되는 것이 아닌 한 적정의견의 감사보고서에 감사인측 전문가의 업무를 언급하여서는 안된다. 만약 법규상 이러한 언급이 요구되거나 감사의견의 변형을 이해하는 것과 관련이 있어 감사인측 전문가의 업무를 감사보고서에 언급하는 경우, 감사보고서에 표시되어야 하는 사항은 무엇인가?","criteria":"감사인은 해당 언급이 감사의견에 대한 감사인의 책임을 경감시키지 않는다는 것을 감사보고서에 표시해야 한다.","keywords":["감사의견","책임","경감","않는다"],"unit":"7.2"},{"title":"감사기준에서 다루는 법규위반에는 기업의 지배기구, 경영진 또는 종업원의 사적인 위법행위, 즉 기업의 사업활동과 관련되지 아니한 행위는 포함되지 않는다. 그 이유는 무엇인가?","criteria":"사적인 행위의 결과는 기업의 책임이 아니라 재무제표에 영향을 미치지 않기 때문이다.","keywords":["재무제표","영향"],"unit":"7.3"},{"title":"법규준수에 대한 책임-감사인의 책임","criteria":"1. 감사인은 법규위반을 예방할 책임이 없으며, 감사인이 모든 법규위반을 발견할 것이라고 기대할 수도 없다\n\n2. 감사인은 기업의 재무제표가 전체적으로 부정이나 오류에 의해 중요하게 왜곡표시되지 아니하였다는 합리적 확신을 얻을 책임이 있다\n\n3. 법규준수와 관련하여서는 특히 감사의 고유한계가 크다\n\n4. 법규 또는 관련 윤리적 요구사항에서 커뮤니케이션 등의 책임을 요구할 수도 있다","keywords":["예방","책임","모든","발견","기대","중요","왜곡표시","합리적 확신","책임","감사","고유한계","법규","관련 윤리적 요구사항","커뮤니케이션","책임"],"unit":"7.3"},{"title":"법규의 관점에서, 중요한 왜곡표시를 발견할 수 있는 감사인의 능력에 대한 고유한계의 잠재적 영향이 더욱 큰 이유는 무엇인가?","criteria":"1. 전형적으로 재무제표에 영향을 미치지 않고 기업의 재무보고와 관련된 정보시스템에 의해 포착되지 않는, 주로 기업의 영업활동 측면과 관련된 법규가 다수 존재한다\n\n2. 법규위반은 공모, 위조, 거래의 고의적인 기재누락, 경영진의 통제무력화 또는 감사인에 대한 의도적인 허위진술 등을 은폐하기 위한 목적으로 설계된 행위들과 관련된 것일 수 있다\n\n3. 특정 행위가 위반에 해당되는지 여부는 궁극적으로 법원 또는 기타 적합한 판결기관이 결정할 사항이다","keywords":["재무제표","영향","기업","정보시스템","포착","영업활동","법규","은폐","목적","관련","위반","여부","법원","결정"],"unit":"7.3"},{"title":"법규준수에 대하여 감사인이 고려할 사항","criteria":"1. 기업과 환경에 대한 이해단계에서 회사에 적용되는 법규 이해\n1.1 기업과 그 기업이 영업을 하고 있는 산업 또는 부문에 적용되는 법규\n1.2 기업이 이러한 법규를 어떻게 준수하고 있는 지에 관한 사항\n\n2. 법규를 준수하고 있다는 충분하고 적합한 감사증거 입수\n\n3. 법규위반을 식별하기 위한 감사절차 수행\n3.1 기업이 이와 같은 법규를 준수하고 있는지 여부에 대하여 경영진(적절한 경우 지배기구를 포함)에게 질의함\n3.2 관련 인허가기관이나 규제기관과의 왕복문서가 있는 경우 이를 검사함\n\n4. 다른 감사절차에서 법규위반이 식별 또는 의심되는 사례가 있는지 주의유지\n\n5. 서면진술\n5.1 감사인은 경영진(적절한 경우 지배기구 포함)에게 재무제표를 작성할 때 그 영향을 고려해야 하는 법규위반 또는 위반으로 의심되는 사항으로서 알고 있는 모든 사실들을 감사인에게 공개하였다는 내용의 서면진술을 제공하도록 요청해야 한다\n\n6. 식별되었거나 의심되는 법규위반이 없는 경우, 감사인은 1~5에 서술된 절차 외에는 기업의 법규준수에 관한 감사절차의 수행이 요구되지 아니한다","keywords":["기업","환경","이해","산업","법규","준수","충분","적합","감사증거","식별","절차","준수","경영진","질의","관련","기관","왕복문서","다른 감사절차","주의유지","서면진술","경영진","재무제표","작성","영향","법규위반","알고 있는","모든","공개","식별","의심","요구"],"unit":"7.3"},{"title":"법규위반이 식별되거나 의심될 때의 감사절차","criteria":"1. 법규위반 또는 의심되는 위반사례를 알게 될 경우\n1.1 행위의 성격 및 그 행위가 발생한 상황을 이해함\n1.2 재무제표에 미칠 수 있는 영향을 평가하기 위한 추가적 정보를 입수함\n\n2. 법규위반이 존재한다고 의심하는 경우\n2.1 경영진(적절한 경우 지배기구를 포함)과 이를 논의\n\n3. 의심되는 법규위반에 대한 감사증거를 입수하지 못할 경우\n3.1 감사증거의 결여 때문에 감사의견에 미치는 영향 고려: 감사범위의 제한(한정의견 또는 의견거절)\n\n4. 법규위반에 대한 감사의 다른 측면 고려\n4.1 감사인의 위험평가, 서면진술의 신뢰성 등","keywords":["위반","의심","알게 될 경우","행위","성격","상황","이해","존재","의심","경영진","논의","의심","증거","입수","못할 경우","감사범위","제한","감사","다른 측면","위험평가","서면진술","신뢰성"],"unit":"7.3"},{"title":"기업이 내부감사기능을 가지고 있는 경우 이해해야 할 사항","criteria":"1. 내부감사기능에 대한 책임\n2. 조직상태\n3. 수행됐거나 수행될 활동의 성격","keywords":["내부감사기능","책임","조직상태","활동","성격"],"unit":"7.3"},{"title":"외부감사인은 표명된 감사의견에 대하여 책임을 진다. 내부감사인의 업무를 활용하는 경우 감사인의 책임은 어떻게 변경되는가?","criteria":"감사인은 감사의견에 대한 전적인 책임을 진다. 그러한 책임은 내부감사기능 또는 감사업무팀에 직접적 보조를 제공하는 내부감사인의 업무를 활용하였다고 하더라도 경감되지 아니한다.","keywords":["전적인 책임","경감","아니한다"],"unit":"7.3"},{"title":"내부감사기능이 수행한 업무의 활용 여부 결정시 고려할 사항","criteria":"1. 내부감사기능의 조직 내 위상과 관련 정책 및 절차가 내부감사인의 객관성을 지원하는 정도\n\n2. 내부감사기능의 적격성수준\n\n3. 품질관리를 포함하여 내부감사기능이 체계적이고 규율된 접근법을 적용하는지 여부","keywords":["조직 내 위상","관련 정책 및 절차","객관성","지원","적격성","체계적","규율된","접근법"],"unit":"7.3"},{"title":"내부감사기능의 객관성 평가에 영향을 미칠 수 있는 요소는 무엇인가?","criteria":"1. 내부감사기능의 권한과 책임을 포함하여, 내부감사기능의 조직 내 위상이 전문가적 판단을 무력화하는 편의, 이해의 상충 또는 타인의 부당한 영향으로부터 자유로울 수 있는 내부감사기능의 능력을 지원하는지 여부\n\n2. 이해가 상충되는 내부감사기능의 책임이 없는지 여부\n\n3. 지배기구가 내부감사기능과 관련된 고용결정을 감시하고 있는지 여부\n\n4. 경영진이나 지배기구가 내부감사기능에 가한 어떠한 제약이나 제한이 있는지 여부\n\n5. 내부감사인이 관련 전문직 단체의 회원인지 여부 및 객관성에 관한 관련 전문가 기준을 준수할 의무가 있는지 여부 또는 내부 정책이 동일한 목적을 달성하는지 여부","keywords":["조직 내 위상","내부감사기능","지원","이해","상충","책임","지배기구","고용결정","감시","경영진","지배기구","제한","객관성","기준","의무"],"unit":"7.3"},{"title":"내부감사기능의 적격성 평가에 영향을 미칠 수 있는 요소는 무엇인가?","criteria":"1. 내부감사기능이 기업규모 및 영업성격에 비례하여 적절하고 적합하게 자원을 갖추고 있는지 여부\n\n2. 내부감사업무에 대한 내부감사인의 고용, 훈련 및 업무부여 정책이 수립되어 있는지 여부\n\n3. 내부감사인이 감사에서 적절한 기술적 훈련과 숙련도를 갖추고 있는지 여부\n\n4. 내부감사인이 기업의 재무보고 및 해당 재무보고체계와 관련하여 필요한 지식을 보유하는지 여부 및 내부감사기능이 기업의 재무제표와 관련된 업무를 수행하는데 필요한 기술을 보유하는지 여부\n\n5. 내부감사인이 관련 전문직 단체의 회원인지 여부","keywords":["기업규모","비례","자원","고용","훈련","업무부여","정책","감사","기술적 훈련","숙련도","재무보고","해당 재무보고체계","지식","기술","보유","전문직","회원"],"unit":"7.3"},{"title":"내부감사기능이 수행한 업무가 활용될 수 있는 영역과 범위를 결정하는 근거로 고려될 수 있는 요소는 무엇인가?","criteria":"1. 외부감사인의 전반감사전략 및 감사계획에 대한 관련성이 높을수록 업무활용을 늘림\n\n2. 관련된 감사절차의 계획 및 수행, 입수된 감사증거의 평가와 같이 많은 판단이 수반될수록 업무활용을 줄임\n\n3. 유의적인 것으로 식별된 위험에 대한 특별한 고려와 함꼐, 경영진 주장 수준의 평가된 중요왜곡표시위험이 높을수록 업무활용을 줄임\n\n4. 내부감사기능의 조직 내 위상과 관련 정책 및 절차가 내부감사인의 객관성을 적절하게 지원하지 못할수록 업무활용을 줄임\n\n5. 내부감사기능의 적격성 수준이 낮을수록 업무활용을 줄임","keywords":["전반감사전략","감사계획","관련성","판단","수반","평가된 중요왜곡표시위험","조직 내 위상","관련 정책 및 절차","객관성","지원","적격성"],"unit":"7.3"},{"title":"내부감사기능이 수행한 업무의 활용시 수행해야 할 절차","criteria":"1. 외부감사인이 내부감사기능이 수행한 업무를 활용할 계획인 경우, 외부감사인은 각자의 활동을 조정하는 근거로서 업무의 활용계획을 내부감사기능과 토의하여야 한다\n\n2. 외부감사인은 내부감사인이 수행한 감사절차의 성격 및 범위와 관련된 발견사항을 이해하기 위하여 외부감사인이 활용하기로 계획한 내부감사기능이 수행한 업무와 관련된 내부감사기능의 보고서를 열람하여야 한다\n\n3. 외부감사인은 다음 사항에 대한 평가를 포함하여 감사목적에 대한 적절성을 결정하기 위해 활용하기로 계획한 내부감사기능의 업무 전체에 대하여 충분한 감사절차를 수행하여야 한다\n3.1 해당 업무가 적절히 계획, 수행, 감독, 검토 및 문서화되었는지 여부\n3.2 합리적 결론 도출을 위한 충분하고 적합한 증거가 입수되었는지 여부\n3.3 도달된 결론이 해당 상황에서 적합하고 내부감사기능이 작성한 보고서가 수행된 업무 결과와 일관성이 있는지 여부","keywords":["활용계획","토의","보고서","열람","평가","계획","수행","감독","검토","문서화","충분","적합","증거","결론","적합","보고서","업무 결과","일관성"],"unit":"7.3"},{"title":"지배기구와 커뮤니케이션의 역할(효익)","criteria":"1. 감사인과 지배기구가 감사에 관련된 사항을 이해하고 건설적인 업무관계를 수립함. 이러한 관계는 감사인의 독립성과 객관성을 유지하면서 발전된다\n\n2. 감사인이 지배기구로부터 감사와 관련된 정보를 입수함. 예를 들어, 지배기구는 감사인이 기업과 그 환경을 이해하고, 감사증거의 적절한 원천을 식별하며, 구체적인 거래나 사건에 관한 정보를 제공할 때 감사인을 도울 수 있다\n\n3. 지배기구가 재무보고절차를 감시하는 책임을 완수함으로써 재무제표의 중요왜곡표시위험을 감소시킴","keywords":["감사","이해","건설적","업무관계","정보","입수","지배기구","감시","책임","중요왜곡표시위험","감소"],"unit":"7.3"},{"title":"감사기준서에서 명시하는 감사인과 경영진의 커뮤니케이션 책임에 대해 서술하시오.","criteria":"1. 감사인: 감사기준에서 요구하는 사항을 지배기구와 커뮤니케이션할 책임이 있다. 감사인이 지배기구와 커뮤니케이션할 사항을 경영진이 커뮤니케이션하였다고 하여, 지배기구에 대한 감사인의 커뮤니케이션 책임이 경감되지는 아니한다. 다만, 경영진이 이러한 사항들에 대하여 지배기구와 커뮤니케이션하는 경우 감사인이 수행할 커뮤니케이션의 형태나 시기에는 영향을 미칠 수 있다\n\n2. 경영진: 기업지배와 관련된 사항을 지배기구와 커뮤니캐이션할 책임이 있다. 감사인이 수행하는 커뮤니케이션은 경영진의 이러한 책임을 경감시키지 아니한다","keywords":["감사기준","요구","사항","지배기구","커뮤니케이션","경영진","경감","아니한다","커뮤니케이션","형태","시기","영향","기업지배","커뮤니케이션","책임","감사인","경감","아니한다"],"unit":"7.3"},{"title":"지배기구를 위해 작성된 커뮤니케이션 문서가 제3자에게 제공될 때를 대비하여, 지배기구와의 커뮤니케이션 문서에 명시해야 하는 사항은 무엇인가?","criteria":"1. 커뮤니케이션 문서는 지배기구, 그리고 해당되는 경우 그룹경영진과 그룹감사인만을 위해 작성되었으며, 제3자가 이에 의존해서는 안됨\n\n2. 감사인은 제3자에 대하여 어떤 책임도 지지 아니함\n\n3. 제3자에 대한 공개 또는 배포에 대한 제한사항","keywords":["지배기구","위해","작성","제3자","의존","책임","공개","제한사항"],"unit":"7.3"},{"title":"감사인이 지배기구와 커뮤니케이션할 사항","criteria":"1. 재무제표감사와 관련된 감사인의 책임\n\n2. 계획된 감사범위와 시기\n\n3. 감사에서의 유의적 발견사항\n\n4. (상장기업) 감사인의 독립성","keywords":["감사인","책임","감사범위","시기","유의적 발견사항","상장","독립성"],"unit":"7.3"},{"title":"감사인이 지배기구와 커뮤니케이션할 사항-재무제표감사와 관련된 감사인의 책임","criteria":"1. 감사인은 지배기구의 감시 하에 경영진이 작성한 재무제표에 대하여 의견을 형성하고 표명할 책임이 있음\n\n2. 재무제표감사는 경영진 또는 지배기구의 책임을 경감시키지 아니함","keywords":["재무제표","의견","표명","책임","경영진","지배기구","책임","경감"],"unit":"7.3"},{"title":"감사인이 지배기구와 커뮤니케이션할 사항-계획된 감사범위와 시기","criteria":"감사인은 계획된 감사범위와 시기의 개요에 대하여 지배기구와 커뮤니케이션하여야 한다.\n(여기에는 감사인이 식별한 유의적 위험에 대하여 커뮤니케이션하는 것이 포함된다.\n=>감사인이 식별한 유의적 위험을 커뮤니케이션하는 것은 지배기구가 감사인이 식별한 유의적 위험과 그 위험이 감사에서 특별히 고려되어야 하는 이유를 이해하는데 도움이 된다. 유의적 위험에 대한 커뮤니케이션은 지배기구가 재무보고절차를 감시하는 책임을 완수하는데 도움을 줄 수 있다.)","keywords":["감사범위","시기","개요","유의적 위험"],"unit":"7.3"},{"title":"감사인이 지배기구와 커뮤니케이션할 사항-감사에서의 유의적 발견사항","criteria":"1. 회계정책과 회계추정 및 재무제표 공시 등 해당 기업 회계실무의 유의적 질적 측면에 대한 감사인의 견해\n\n2. 감사 중 직면한 유의적 어려움이 있다면 그 내용\n\n3. 지배기구의 모든 구성원이 그 기업의 경영에 참여하고 있지 않는 한, 다음의 각 사항\n3.1 감사 중 발생하여 경영진과 논의하였거나 서신을 교환하였던 유의적인 사항\n3.2 감사인이 요청하고 있는 서면진술\n\n4. 감사보고서의 형태와 내용에 영향을 미치는 상황이 있다면 그 상황\n\n5. 감사 중 발생한 기타 유의적 사항으로서, 감사인의 전문가적 판단에 비추어 볼 때 재무보고절차의 감시와 관련성이 있는 사항","keywords":["회계실무","유의적 질적 측면","유의적 어려움","경영진","유의적","사항","요청","서면진술","감사보고서","형태","내용","영향","기타 유의적 사항","재무보고절차","감시"],"unit":"7.3"},{"title":"감사인이 지배기구와 커뮤니케이션할 사항-(상장기업) 감사인의 독립성","criteria":"1. 업무팀, 적합한 경우 회계법인의 타 구성원, 회계법인, 그리고 해당사항이 있는 경우 네트워크 회계법인은 독립성에 대한 관련 윤리적 요구사항들을 준수하고 있다는 진술\n1.1 감사인의 전문가적 판단에 따라 회계법인, 네트워크 회계법인 그리고 기업 사이에 독립성 문제와 관련된다고 합리적으로 판단되는 모든 관계와 기타사항들. 여기에는 감사대상 재무제표의 보고기간에 해당 회계법인 및 네트워크 회계법인이 감사대상 기업 및 그 통제 하에 있는 부문들에 대하여 감사 및 비감사 서비스를 제공하고 청구한 총 보수가 포함되어야 한다. 이 보수는 지배기구가 각 서비스들이 감사인의 독립성에 미치는 영향을 평가하는 데 적절히 도움이 되도록 서비스유형 별로 배분되어야 한다\n1.2 식별된 독립성 훼손위협을 제거하거나 수용가능한 수준으로 감소시키기 위해 적용한 관련 제도적 안전장치","keywords":["독립성","관련 윤리적 요구사항","준수","독립성 문제","관련","합리적","판단","모든","관계","안전장치"],"unit":"7.3"},{"title":"감사인이 계획된 감사범위와 시기에 대해 지배기구와 커뮤니케이션하는 것은 어떤 사항에 도움을 주는가?","criteria":"1. 지배기구가 감사인의 업무결과를 더 잘 이해하고, 위험과 중요성의 개념에 대한 이슈에 대하여 감사인과 논의하고, 감사인이 추가적인 절차를 취하도록 요청할 분야를 식별함\n\n2. 감사인이 기업과 그 환경을 더 잘 이해함","keywords":["지배기구","업무결과","이해","위험","중요성","논의","추가","절차","요청","기업","환경","이해"],"unit":"7.3"},{"title":"지배기구 구성원의 일부 또는 전부가 기업경영에 참여하고 있는 경우, 계획된 감사범위와 시기에 대하여 지배기구와 커뮤니케이션 할 때 주의할 점은 무엇인가?","criteria":"감사의 효과성을 훼손시키지 않기 위해 주의가 필요하다. 예를 들어, 감사절차의 성격이나 시기에 대하여 상세하게 커뮤니케이션하는 것은 감사절차를 지나치게 예측가능하게 함으로써 그러한 절차의 효과성을 감소시킬 수 있다.","keywords":["효과성","훼손","주의","예측가능"],"unit":"7.3"},{"title":"지배기구와 커뮤니케이션하는 경우, 커뮤니케이션의 1. 시기 및 2. 형태에 대하여 서술하시오","criteria":"1. 시기: 감사인은 적시에 지배기구와 커뮤니케이션해야 한다\n\n2. 형태: 구두 또는 서면으로 커뮤니케이션하여야 한다. 서면 커뮤니케이션에서 감사에서 발생한 모든 사항들을 포함시킬 필요는 없지만, 독립성 문제와 구두로 커뮤니케이션하는 것이 적절하지 않을 것으로 판단되는 유의적 사항에 대해서는 반드시 서면으로 커뮤니케이션하여야 한다","keywords":["적시","구두","서면","독립성","적절","판단","유의적 사항","반드시 서면"],"unit":"7.3"},{"title":"감사인은 감사인과 지배기구간의 양방향 커뮤니케이션이 해당 감사의 목적을 위하여 적절하였는지 여부를 평가하여야 한다. 평가 결과 감사인과 지배기구간의 양방향 커뮤니케이션이 불충분하고 그 상황이 해결될 수 없는 경우, 감사인이 취할 수 있는 조치는 무엇인가?","criteria":"1. 감사범위의 제한을 근거로 감사의견을 변형시킴\n\n2. 다른 일련의 조치의 경우 그 결과에 대한 법적 조언을 얻음\n\n3. 제3자, 기업의 소유주와 같이 지배구조상 기업의 외부에 존재하는 상위기관, 또는 공공부문의 경우 책임이 있는 정부의 주무부서나 의회와 커뮤니케이션함\n\n4. 관련 법규상 가능하다면, 감사업무를 해지함","keywords":["감사범위","제한","의견","변형","법적 조언","제3자","소유주","커뮤니케이션","법규","가능","해지"],"unit":"7.3"},{"title":"현금실사 시 유의사항","criteria":"1. 동시 실사: 현금은 받을어음, 유가증권, 투자자산과 상호 호환성이 있기 때문에 동시에 실시하여야 한다. 동시 실사가 불가능할 경우 예고하지 않고 불시에 실시한다\n\n2. 담당자 참관: 실물의 분실 등으로 인한 오해의 소지를 없애기 위하여 담당자 참관 하에 실사를 진행하고, 실사 후 즉시 반환하였음을 확인증 등을 통해 확인받아야 한다\n\n3 실사일: 재무제표일에 실시한다. 부득이 재무제표일 전이나 후에 실물검사를 실시하는 경우 실물검사일로부터 재무제표일까지의 입/출금에 대하여 추가적인 증거(문서검사 등)를 확보하여야 한다","keywords":["동시 실사","현금","호환성","동시","불시","담당자 참관","분실","실사","즉시 반환","확인","실사일","재무제표일","전이나 후","실물검사일","재무제표일","추가적","증거"],"unit":"8"},{"title":"은행조회서 발송 대상 은행에 대해 서술하시오.","criteria":"은행조회는 채권/채무조회와는 달리 총계정원장상 예금/적금 및 차입금잔액이 존재하는 거래처뿐만 아니라 잔액은 없지만 기중에 거래가 있었던 모든 은행에 대하여 조회서를 발송하여야 한다.\n(예금/적금 및 차입금 잔액이 누락되었을 가능성을 조사하기 위함)","keywords":["기중","거래","모든","은행","잔액","누락"],"unit":"8"},{"title":"은행조회의 구체적인 절차","criteria":"1. 은행조회는 기말감사 이전에 감사인 회신용, 은행 보관용의 2부를 감사인이 직접 작성하고 control sheet를 작성한다\n\n2. 은행조회서는 은행으로부터 원본(전자 또는 우편)을 감사인이 직접 회수하는 것이 원칙이다\n\n3. 회수가 불가능할 경우 감사인이 직접 방문회수, 2차/3차 재발송, fax로 수령한 후 현장 철수 후 우편으로 회신하는 등의 대체적인 절차를 취할 수 있다\n\n4. 은행조회서를 회수하지 못한 경우 은행측 담당자와 직접 통화하여 수신여부를 확인하고 답신을 독촉한다","keywords":["2부","감사인","직접","작성","원본","직접","회수","회수","불가능","대체적","절차","담당자","통화","독촉"],"unit":"8"},{"title":"매출채권과 달리 매입채무의 경우 일반적으로 과소계상하려는 유인을 가지고 있으며, 이 경우 금액이 큰 거래처 위주로 조회대상을 선정하는 방법은 과소계상 오류를 적발하는 데 매우 취약하다. 매입채무와 관련하여 적절한 조회대상 선정 방법은 무엇인가?","criteria":"모든 거래처에 대하여 무작위 추출하거나 주된 거래처임에도 불구하고 잔액이 적거나 없는 거래처를 조회대상으로 선정하는 것이 바람직할 것이다. 이 경우 조회대상은 반드시 감사인이 직접 선정하여야 한다.","keywords":["모든 거래처","무작위 추출","주된 거래처","잔액","적거나 없는","직접 선정"],"unit":"8"},{"title":"매출의 기간귀속(cut-off)","criteria":"1. 회계연도말 전후 최종 및 최초 인도분에 대한 적송서류번호와 차기 회계연도의 매출거래기록을 비교한다\n\n2. 재무제표일을 전후한 일정기간(일반적으로 약 5일 내외) 동안의 재고인도 및 용역의 제공이 해당기간에 적절히 반영되었는지 검사한다. 이때 매출 기록에서 표본을 추출하여 기간귀속 테스트를 수행하는 경우 실재성에 대한 감사증거를 입수할 수 있으며, 선적서류 등 관련증빙에서 표본을 추출하여 기간귀속 테스트를 수행하는 경우 완전성에 대한 감사증거를 입수할 수 있다\n\n3. 재무제표일 이전에 판매한 재고의 반품에 대한 수정이 재무제표일 현재 적절하게 처리되었는지 검사한다\n\n4. 재무제표일 전후의 최근 월에 대한 매출채권의 분석적절차를 통하여 기간귀속이 왜곡되었을 징후를 파악한다","keywords":["회계연도말 전후","적송서류","매출거래기록","비교","재무제표일","전후","재고인도","반영","실재성","완전성","재무제표일 이전","반품","적절","재무제표일 전후","매출채권","분석적절차","기간귀속"],"unit":"8"},{"title":"재고자산은 실재성 뿐 아니라 완전성을 확인하는 것도 중요하다. 재고자산이 재무제표의 다른 항목에 미치는 영향을 고려하여 완전성 확인이 중요한 이유를 서술하시오","criteria":"1. 손익계산서상 매출원가의 과대계상을 통한 당기손익의 조작 가능성이 있다\n\n2. 재무상태표상 매입채무의 과소계상 즉, 부외부채 가능성이 있다","keywords":["매출원가","과대계상","당기손익","매입채무","과소계상","부외부채"],"unit":"8"},{"title":"감사인은 유형자산 관련 실증절차 수행시 거래유형에 대한 세부테스트에 의존할 수 있다. 이 경우 선행되어야 하는 조건은 무엇인가?","criteria":"1. 기초잔액에 대한 충분하고 적합한 증거가 존재함\n\n2. 당기 중 거래량이 많지 않아 회전율이 낮음\n\n3. 내부통제가 효과적임","keywords":["기초잔액","충분","적합","증거","거래량","회전율","낮음","내부통제","효과적"],"unit":"8"},{"title":"유형자산의 계정잔액에 대한 세부테스트","criteria":"권리증서(등기부등본/등록원부 등)를 입수하여 유형자산의 실재성, 소유권, 담보제공 및 보험가입여부를 확인한다.","keywords":["권리증서","실재성","소유권","담보제공","보험가입"],"unit":"8"},{"title":"차입금의 경우 조회를 통하여 상당부분의 감사목적을 달성할 수 있으므로 누락하거나 생략하여서는 안 된다. 이때 재무제표일 현재 차입금잔액이 없는 거래처라 할지라도 기중에 은행과 금융거래가 있었다면 반드시 조회하여야 하는 이유는 무엇인가?","criteria":"예금거래만 있는 은행이라 할지라도 장부에 기록되지 않은 차입금이 존재할 가능성이 있기 때문이다.","keywords":["장부","기록","않은","차입금","가능성"],"unit":"8"},{"title":"재무제표일의 개념","criteria":"재무제표가 포함하는 가장 최근 보고기간의 말일","keywords":["가장","최근","보고기간","말일"],"unit":"9"},{"title":"재무제표 승인일의 개념","criteria":"재무제표를 구성하는 모든 내용이 작성이 완료되고 인정된 권한을 가진 기구가 해당 재무제표에 대하여 책임을 진다고 확인한 날","keywords":["재무제표","작성","완료","권한","기구","책임","확인"],"unit":"9"},{"title":"감사보고서일의 개념","criteria":"1. 감사인과 경영진 간의 책임의 한계를 구분짓는 하나의 기준일로서 '그 날까지 발생한 사건에 대하여 감사인이 알게 된 사건과 거래의 영향을 감사인이 고려하였다는 것을 감사보고서 이용자들에게 알리는 것'\n\n2. 감사인이 재무제표에 대한 의견의 기초가 되는 충분하고 적합한 감사증거를 입수하는 날, 재무제표 승인일 및 업무품질관리검토의 종료일보다 빨라서는 안 된다","keywords":["감사인","경영진","책임","구분","기준일","그 날까지","알게된","사건","거래","영향","고려","충분","적합","감사증거","승인일","업무품질관리검토","종료일"],"unit":"9"},{"title":"재무제표 발행일의 개념","criteria":"감사보고서와 감사받은 재무제표를 제3자들이 이용할 수 있게 된 날","keywords":["감사보고서","재무제표","제3자","이용"],"unit":"9"},{"title":"후속사건에 대한 회계처리-재무제표일 현재에 존재하였던 상황에 대한 추가적인 증거가 발견되는 경우","criteria":"재무제표를 수정","keywords":["수정"],"unit":"9"},{"title":"후속사건에 대한 회계처리-재무제표일 현재로는 존재하지 않았으나 그 후에 발생한 상황에 대한 증거를 제공하는 사건","criteria":"정보이용자의 합리적인 의사결정에 영향을 미칠만큼 중요한 경우 주석에 공시","keywords":["중요","주석","공시"],"unit":"9"},{"title":"후속사건 감사절차(재무제표일과 감사보고서일 사이에 발생한 사건)","criteria":"재무제표일과 감사보고서일 사이에 발생한 사건은 아직 감사가 종료되지 않았기 때문에 감사인의 노력 여하에 따라 충분하고 적합한 감사증거를 수집할 수 있다. 따라서 감사인은 감사보고서일까지 발생한 사건으로서 재무제표의 수정이나 공시를 필요로 하는 사건을 모두 파악 (적극적 책임)하는데 필요한 충분하고 적합한 감사증거를 수집할 수 있도록 감사절차를 설계/수행해야 한다. 그러나 이전에 적용한 감사절차에서 만족할 만한 결론이 제공된 사항들에 대하여는 감사인이 추가적인 감사절차를 수행하도록 기대되지 아니한다.","keywords":["수정","공시","필요","사건","모두","파악","적극적 책임"],"unit":"9"},{"title":"재무제표일 후 감사보고서일까지 발생한 사건에 대한 감사절차","criteria":"1. 경영진이 후속사건을 식별하기 위해 수립한 절차들을 이해한다\n\n2. 재무제표에 영향을 미칠 수 있는 후속사건이 발생했는지 여부에 대하여 경영진(적절한 경우 지배기구 포함)에게 질문한다\n\n3. 재무제표일 후에 개최된 주주, 경영진 그리고 지배기구회의록이 있을 경우 이를 열람하고, 회의록이 아직 이용가능하지 않은 경우에는 해당 회의에서 논의된 사항들에 대하여 질문함\n\n4. 기업의 최근 후속 중간재무제표가 있다면, 이를 열람한다","keywords":["경영진","후속사건","식별","절차","이해","후속사건","발생","여부","경영진","질문","재무제표일 후","회의록","열람","논의","사항","질문","최근","중간재무제표","열람"],"unit":"9"},{"title":"후속사건에 대한 감사절차는 언제까지 수행해야 하는가?","criteria":"재무제표일로부터 감사보고서일 또는 감사보고서일과 가장 가까운 실행가능한 일자까지의 기간에 대하여 상기의 후속사건 감사절차를 수행하여야 한다.","keywords":["감사보고서일","가장 가까운","실행가능","일자"],"unit":"9"},{"title":"감사보고서일 후 후속사건에 대한 감사인의 책임","criteria":"감사인은 감사보고서일 후에는 재무제표에 대하여 어떠한 감사절차도 수행할 의무가 없다.","keywords":["재무제표","의무","없다"],"unit":"9"},{"title":"감사보고서일 후 재무제표 발행일 전에 알게 된 경우 감사절차","criteria":"1. 경영진과 이 사항을 토의함\n\n2. 재무제표의 수정이 필요한지 여부를 결정함\n\n3. 재무제표의 수정이 필요하다고 결정했다면, 경영진이 재무제표에 이 사항을 어떻게 다룰 계획인지에 대하여 질문함","keywords":["경영진","토의","수정","필요","결정","경영진","재무제표","계획","질문"],"unit":"9"},{"title":"모든 후속사건에 대하여 새로운 감사보고서일까지 감사절차를 확대하는 경우(감사보고서일 후 재무제표 발행일 전)","criteria":"1. 해당 수정사항에 대하여 해당 상황에 필요한 감사절차를 수행함\n\n2. 해당 후속사건 이외에도 모든 후속사건에 대하여 상기의 '후속사건 감사절차'를 새로운 감사보고서일자까지 연장함 \n\n3. 수정된 재무제표에 대하여 감사인은 새로운 감사보고서를 경영진에게 제출함. 단, 새로운 감사보고서의 일자는 수정된 재무제표의 승인일보다 빠르지 않아야 한다","keywords":["필요","감사절차","모든","후속사건","감사절차","연장","새로운 감사보고서","경영진","제출","일자","승인일"],"unit":"9"},{"title":"감사보고서일 후 재무제표 발행인 전-추가 후속사건에만 한정하여 새로운 감사보고서일까지 감사절차를 확대하는 경우","criteria":"1. 이중 감사보고서일(최초 감사보고서일+새로운 감사보고서일)을 사용\n1.1 기존 후속사건에 대해서는 이미 최초 감사보고서일까지 후속사건 감사절차를 완료하였기 때문에 최초 감사보고서일을 유지하고\n1.2 추가 후속사건에 대해서는 새로운 감사보고서일까지 후속사건 감사절차를 수행하고 새로운 감사보고서일을 추가함\n이는 추가적인 후속사건 감사절차가 오직 재무재표의 관련 주석에 기술된 수정에만 한정하여 수행되었다는 것을 나타낸다\n\n2. 최초 감사보고서일만을 사용+추가 후속사건을 강조(기타)사항문단에 추가하여 설명\n2.1 추가 후속사건에 대한 감사절차는 오직 재무제표의 관련 주석에 기술된 수정에만 한정하여 수행되었다는 설명을 강조사항문단 또는 기타사항문단에 포함하는 새로운(또는 수정된) 감사보고서를 제출","keywords":["이중 감사보고서일","추가 후속사건","새로운 감사보고서일","관련 주석에 기술된 수정에만 한정","최초 감사보고서일","강조","기타","문단","추가 후속사건","감사절차","관련 주석에 기술된 수정에만 한정","강조사항문단","기타사항문단"],"unit":"9"},{"title":"추가 후속사건에만 한정하여 새로운 감사보고서일까지 감사절차를 확대하는 경우, 기존 후속사건은 최초 감사보고서일이 적용되며, 추가 후속사건은 새로운 감사보고서일이 적용(이중감사보고서일 사용)되도록 하는 이유는 무엇인가?","criteria":"최초 일자는 감사보고서의 이용자들에게 해당 재무제표에 대한 감사업무가 언제 종료되었는지 알려주며, 추가적인 일자는 후속사건에 대한 감사인의 적극적 책임을 모든 후속사건에 대하여 연장하지 않고 오직 추가 후속사건에만 한정한다는 사실을 알려준다.","keywords":["적극적 책임","추가 후속사건","한정"],"unit":"9"},{"title":"경영진이 재무제표를 수정하지 않는 경우(감사보고서일 후 재무제표 발행일 전)","criteria":"1. 감사보고서를 기업에 제출하지 않은 경우\n1.1 감사인은 감사보고서를 재발행하여 감사의견을 변형(한정의견 or 부적정의견)하여야 한다. 감사인이 수정을 권고하였음에도 불구하고 경영진이 이를 받아들이지 않으면 회계기준위배이기 때문이다\n\n2. 감사보고서를 기업에 제출한 경우\n2.1 감사인은 경영진(지배기구의 모든 구성원이 그 기업의 경영에 참여하는 경우가 아니라면 지배기구를 포함)에게, 필요한 수정을 하기 전에는 재무제표를 제3자에게 발행하지 말라고 통보하여야 한다\n2.2 그럼에도 불구하고 필요한 수정 없이 재무제표가 발행된 경우, 감사인은 재무제표 이용자가 해당 감사보고서에 의존하는 것을 방지하기 위한 적합한 조치를 취하여야 한다. 이때 적합한 조치란 감사인의 법적 권리와 의무에 따른다. 따라서 감사인은 법적 조언을 구하는 것이 적절하다고 생각할 수도 있다","keywords":["감사보고서","재발행","의견","변형","한정의견","부적정의견","회게기준위배","제3자","발행","통보","재무제표 이용자","감사보고서","의존","방지","조치"],"unit":"9"},{"title":"감사보고서일 후 후속사건에 대한 감사인의 책임","criteria":"재무제표가 발행된 후애는, 감사인은 그 재무재표에 대하여 어떠한 감사절차도 수행할 의무가 없다.","keywords":["재무제표","의무","없다"],"unit":"9"},{"title":"재무제표 발행일 후 알게 된 경우 감사절차","criteria":"1. 경영진과 이 사항을 토의함\n\n2. 재무제표의 수정이 필요한지 여부를 결정함\n\n3. 재무제표의 수정이 필요하다고 결정했다면, 경영진이 재무제표에서 이 사항을 어떻게 다룰 계획인지 질문함","keywords":["경영진","토의","수정","필요","결정","경영진","재무제표","계획","질문"],"unit":"9"},{"title":"경영진이 재무제표를 수정하는 경우(재무제표 발행일 후)","criteria":"1. 해당 수정사항에 대하여 해당 상황에 필요한 감사절차(후속사건 감사절차)를 수행함\n\n2. 재무제표 재발행 상황에 대하여 경영진이 취한 조치를 검토\n\n3. 수정된 재무제표에 대한 새로운 감사보고서 제출\n\n4. 강조사항문단 또는 기타사항문단에 다음을 추가","keywords":["필요","감사절차","재발행","경영진","조치","검토","수정된 재무제표","새로운 감사보고서","강조","기타"],"unit":"9"},{"title":"해당 수정사항에 대하여 해당 상황에 필요한 감사절차(후속사건 감사절차)를 수행함-경영진이 재무제표를 수정하는 경우(재무제표 발행일 후)","criteria":"이때 감사보고서일을 단일로 사용할 것인지 아니면 이중으로 사용할 것인지에 따라 후속사건 감사절차를 수행할 기간이 달라진다.","keywords":["감사보고서일","단일","이중"],"unit":"9"},{"title":"재무제표 재발행 상황에 대하여 경영진이 취한 조치를 검토-경영진이 재무제표를 수정하는 경우(재무제표 발행일 후)","criteria":"이전에 발행된 재무제표와 감사보고서를 수령한 모든 사람들이 이러한 상황에 대한 통보를 받았는지 확인하게 하기 위하여 경영진이 취한 조치를 검토함","keywords":["이전","재무제표","감사보고서","상황","통보","확인","경영진","조치","검토"],"unit":"9"},{"title":"수정된 재무제표에 대한 새로운 감사보고서 제출-경영진이 재무제표를 수정하는 경우(재무제표 발행일 후)","criteria":"1. 모든 후속사건에 대하여 새로운 감사보고서일까지 감사절차를 확대하는 경우: 단일 감사보고서일을 사용(새로운 감사보고서일은 수정된 재무제표 승인일 보다 빠르지 않아야 함)\n\n2. 추가 후속사건에만 한정하여 새로운 감사보고서일까지 감사절차를 확대하는 경우: 다음 중 어느 하나의 절차를 수행함\n2.1 이중 감사보고서일(최초 감사보고서일+새로운 감사보고서일)을 사용\n2.1.1 기존 후속사건에 대해서는 이미 최초 감사보고서일까지 후속사건 감사절차를 완료하였기 때문에 최초 감사보고서일을 유지하고\n2.1.2 추가 후속사건에 대해서는 새로운 감사보고서까지 후속사건 감사절차를 수행하고 새로운 감사보고서일을 추가함. 이는 추가적인 후속사건 감사절차가 오직 재무제표의 관련 주석에 기술된 수정에만 한정하여 수행되었다는 것을 나타낸다\n2.2 최초(또는 새로운) 감사보고서일만을 사용+추가 후속사건을 강조(기타)사항문단에 추가하여 설명\n2.2.1 추가적인 후속사건 감사절차는 오직 재무제표의 관련 주석에 기술된 수정에만 한정하여 수행되었다는 설명을 강조사항문단 또는 기타사항문단에 포함하는 새로운 감사보고서 또는 수정된 감사보고서를 제출함","keywords":["모든","후속사건","감사절차","확대","단일","감사보고서일","승인일","추가 후속사건","한정","감사절차","확대","이중 감사보고서일","새로운 감사보고서일","관련 주석에 기술된 수정에만 한정","최초","감사보고서일","강조","기타","문단","관련 주석에 기술된 수정에만 한정"],"unit":"9"},{"title":"강조사항문단 또는 기타사항문단에 다음을 추가-경영진이 재무제표를 수정하는 경우(재무제표 발행일 후)","criteria":"감사인은 새로운 감사보고서 또는 수정된 감사보고서에 강조사항문단 또는 기타사항문단을 추가한다. 그 문단에는 1. 이전에 발행한 재무제표의 수정이유를 더 넓게 논의한 재무제표 주석을 참조하라는 내용과 2. 감사인이 이전에 발행한 감사보고서를 언급한다.","keywords":["강조","기타","문단","수정이유","넓게 논의","주석","참조","이전","발행","감사보고서","언급"],"unit":"9"},{"title":"재무제표 발행일 후-경영진이 재무제표를 수정하지 않고 필요조치를 취하지 않는 경우","criteria":"1. 경영진에게 감사보고서에 대한 차후의 의존을 방지할 조치를 취할 것이라고 통보하여야 한다\n\n2. 그러한 통보에도 불구하고 경영진 또는 지배기구가 필요한 조치를 취하지 않으면, 감사인은 해당 감사보고서에 의존을 방지하기 위한 적합한 조치를 취하여야 한다","keywords":["경영진","감사보고서","의존","방지","조치","통보","감사보고서","의존","방지","조치"],"unit":"9"},{"title":"계속기업존속능력 평가책임","criteria":"계속기업은 재무제표 작성을 위한 전제이므로 계속기업으로서의 존속능력을 평가할 책임은 경영진에게 있다.","keywords":["계속기업","재무제표","작성","전제","책임","경영진"],"unit":"9"},{"title":"계속기업전제와 관련된 감사인의 책임","criteria":"1. 재무제표의 작성에 있어 경영진의 회계의 계속기업전제 사용의 적합성에 대하여 충분하고 적합한 감사증거를 입수하고 결론을 내릴 책임\n\n2. 입수된 감사증거에 기초하여 계속기업으로서의 존속능력에 대한 중요한 불확실성이 존재하는지 여부에 대하여 결론을 내릴 책임","keywords":["계속기업전제","사용","적합성","충분","적합","감사증거","입수","결론","중요한 불확실성","존재","결론"],"unit":"9"},{"title":"경영진의 예비평가 관련 감사절차(경영진이 예비평가를 수행한 경우)","criteria":"1. 경영진이 수행한 계속기업전제에 대한 예비평가에 대하여 경영진과 토의\n\n2. 계속기업으로서의 존속능력에 유의적인 의문을 초래할만한 사건/상황을 식별하였는가?: 경영진에게 확인\n\n3. 식별한 경우: 유의적 의문에 대한 경영진의 계획을 확인","keywords":["경영진","토의","유의적","의문","사건","상황","경영진","식별","경영진","계획"],"unit":"9"},{"title":"경영진의 예비평가 관련 감사절차(경영진이 예비평가를 수행하지 않은 경우)","criteria":"1. 경영진이 판단한 계속기업전제 사용의 근거: 경영진과 토의\n\n2. 계속기업으로서의 존속능력에 유의적인 의문을 초래할만한 사건/상황의 존재 유뮤: 경영진에게 질문","keywords":["계속기업전제","근거","경영진","토의","유의적","의문","사건","상황","존재","경영진","질문"],"unit":"9"},{"title":"경영진의 평가에 대한 감사인의 평가","criteria":"1. 경영진이 평가를 위해 수행한 절차\n\n2. 평가의 기초가 된 가정\n\n3. 경영진의 향후 실행계획\n\n4. 경영진 계획의 실행가능성 여부를 평가\n\n5. 감사인이 감사를 수행한 결과 알게 된 관련 정보가 경영진의 평가에 모두 포함되었는지 여부","keywords":["경영진","평가","절차","가정","실행계획","실행가능성","감사인","알게 된","정보","경영진","평가","포함"],"unit":"9"},{"title":"감사인이 경영진이 적용한 회계의 계속기업전제를 고려할 때의 주요 부분은 계속 기업으로서의 존속능력에 대한 경영진의 평가이다. 한편, 경영진은 계속기업으로서의 존속능력을 평가할 때 세부적인 분석을 수행하지 않을 수 있다. 어떤 경우에 경영진이 계속기업가정으로서의 존속능력에 대한 세부적인 분석을 수행하지 않아도 되는가?","criteria":"1.기업이 이익을 실현해 왔고, 2.용이하게 금융자원에 접근할 수 있으면 세부적인 분석을 수행하지 않아도 경영진은 계속기업으로서의 존속능력을 평가할 수 있다.","keywords":["이익","실현","용이","금융자원","접근"],"unit":"9"},{"title":"계속기업 존속능력에 유의적 의문을 불러일으킬만한 사건/상황이 파악된 경우","criteria":"1. 경영진이 계속기업으로서의 존속능력에 대한 평가를 아직 수행하지 않은 경우, 평가를 수행하도록 요청함\n\n2. 계속기업에 대한 경영진의 평가와 관련된 경영진의 향후 실행계획에 대하여, 이러한 계획의 결과가 상황을 개선시킬지 여부 그리고 경영진의 계획이 해당 상황에서 실행가능한지 여부를 평가함\n\n3. 기업이 현금흐름을 예측하였고 이 예측에 대한 분석이 경영진의 미래 실행계획을 평가할 때 사건이나 상황의 미래결과를 고려하는데 유의적인 요소일 경우, 다음의 절차를 수행함\n3.1 예측을 위해 생성된 기초 데이터의 신뢰성을 평가함\n3.2 예측의 기초가 되는 가정들에 대한 적절한 근거가 있는지 여부를 평가함\n\n4. 경영진이 평가를 실시한 날 후에 추가적인 사실이나 정보가 이용가능하게 되었는지 여부를 고려함\n\n5. 경영진에게 향후 실행계획과 이러한 계획의 실행가능성에 대하여 서면진술을 요청함","keywords":["경영진","평가","요청","실행계획","상황","개선","실행가능","현금흐름","평가","유의적","데이터","신뢰성","평가","가정","근거","평가","추가적","정보","이용가능","경영진","실행계획","실행가능성","서면진술"],"unit":"9"},{"title":"중요한 불확실성이 존재하는 경우 재무제표와 관련하여 결정할 사항","criteria":"1. 계속기업으로서의 존속능력에 대하여 유의적 의문을 초래할 수 있는 주요 사건이나 상황 및 이러한 사건이나 상황을 다루기 위한 경영진의 계획이 재무제표에 적절히 기술되어 있는지 여부\n\n2. 계속기업으로서의 존속능력에 대하여 유의적 의문을 초래할 수 있는 사건이나 상황과 관련하여 중요한 불확실성이 존재하고, 따라서 정상적인 사업과정에서 자산을 회수하고 부채를 상환하지 못할 수 있다는 사실이 재무제표에 명확히 공시되어 있는지 여부","keywords":["계속기업","존속능력","유의적","의문","사건","상황","경영진","계획","재무제표","기술","중요한 불확실성","존재","자산","회수","부채","상환","재무제표","공시"],"unit":"9"},{"title":"close call' 상황","criteria":"계속기업으로서의 존속능력에 대해 유의적 의문을 초래할 수 있는 사건이나 상황이 식별되었으나, 이러한 사건이나 상황을 다루기 위한 경영진의 계획을 고려한 후 경영진과 감사인이 중요한 불확실성이 존재하지 않는다는 결론을 내리는 상황","keywords":["유의적","의문","사건","상황","식별","경영진","계획","고려","중요한 불확실성","존재","않는다","결론"],"unit":"9"},{"title":"회계의 계속기업전제의 사용이 부적합한 경우","criteria":"재무제표가 회계의 계속기업전제를 사용하여 작성되었지만 재무제표 작성에 있어 경영진의 회계의 계속기업전제 사용이 부적합하다고 판단되면, 감사인은 부적정의견을 표명하여야 한다.","keywords":["부적정"],"unit":"9"},{"title":"회계의 계속기업전제의 사용이 적합하나 중요한 불확실성이 존재하고 적절한 공시가 이루어진 경우","criteria":"적정의견을 표명하여야 하며 다음의 목적을 위한 \"계속기업 관련 중요한 불확실성\"이라는 제목의 별도단락을 감사보고서에 포함하여야 한다.\n\n1. 계속기업 관련 중요한 불확실성을 공시하고 있는 재무제표의 주석에 주의를 기울이도록 함\n\n2. 이러한 사건과 상황이 계속기업으로서의 존속능력에 유의적 의문을 초래할 수 있는 중요한 불확실성이 존재한다는 사실을 나타낸다는 점을 명시하고 해당 사항과 관련하여 감사의견이 변형되지 않았음을 명시함","keywords":["적정","계속기업 관련 중요한 불확실성","제목","별도단락","감사보고서","포함","중요한 불확실성","공시","주석","주의","중요한 불확실성","명시","감사의견","변형","명시"],"unit":"9"},{"title":"회계의 계속기업전제의 사용이 적합하나 중요한 불확실성이 존재하고 적절한 공시가 이루어지지 않은 경우","criteria":"1. 해당 중요성에 따라 한정의견이나 부적정의견을 표명함\n\n2. 감사보고서의 한정의견근거(부적정의견근거) 단락에, 계속기업으로서의 존속능력에 유의적 의문을 초래할 수 있는 중요한 불확실성이 존재한다는 점을 명시하고 재무제표에는 이 사항이 적절하게 공시되어 있지 않음을 명시함","keywords":["한정","부적정","근거","단락","중요한 불확실성","존재","명시","재무제표","적절","공시","명시"],"unit":"9"},{"title":"경영진이 계속기업에 대한 평가 또는 평가의 확대를 기피하는 경우","criteria":"감사인이 요청하는데도 경영진이 계속기업에 대한 평가 또는 평가의 확대를 꺼리는 경우, 이러한 경영진의 행동으로 감사인이 충분하고 적합한 감사증거를 수집할 수 없다고 판단하면, 감사인은 한정의견 또는 의견거절한다.","keywords":["충분","적합","감사증거","판단","한정","의견거절"],"unit":"9"},{"title":"왜곡표시의 구분","criteria":"감사인은 1. 감사 중 집계한 왜곡표시의 영향을 평가하고 2. 경영진 및 지배기구와 왜곡표시에 대한 커뮤니케이션하는 데 유의하도록, 왜곡표시를 다음과 같이 구별하는 것이 유용할 것이다.","keywords":["영향","평가","경영진","지배기구","커뮤니케이션"],"unit":"9"},{"title":"왜곡표시의 구분-사실적 왜곡표시","criteria":"사실적 왜곡표시는 의심의 여지가 없는 왜곡표시를 말한다.","keywords":["의심","여지","없는"],"unit":"9"},{"title":"왜곡표시의 구분-판단적 왜곡표시","criteria":"판단적 왜곡표시는 감사인이 비합리적이라고 고려하는, 재무제표의 인식, 측정, 표시와 공시(회계정책의 선택 또는 적용 포함) 등과 관련된 경영진의 판단으로 인하여 발생하는 차이를 말한다.","keywords":["감사인","비합리적","경영진","판단","차이"],"unit":"9"},{"title":"왜곡표시의 구분-투영된 왜곡표시","criteria":"투영된 왜곡표시는 모집단의 왜곡표시에 대한 감사인의 최선의 추정치이며, 감사표본에서 식별된 왜곡표시를 표본이 추출된 전체 모집단으로 투영하는 것을 말한다.","keywords":["모집단","왜곡표시","최선","추정치"],"unit":"9"},{"title":"식별된 왜곡표시의 집계","criteria":"감사인은 명백하게 사소한 것을 제외하고는 감사 중 식별된 왜곡표시를 집계하여야 한다.","keywords":["명백","사소","제외"],"unit":"9"},{"title":"감사 중 식별된 왜곡표시에 대한 고려","criteria":"감사인은 다음 중 하나의 경우 전반감사전략과 감사계획을 수정할 필요가 있는지 결정하여야 한다.\n\n1. 식별된 왜곡표시의 성격과 그 발생된 상황에 따르면 다른 왜곡표시가 존재할 가능성을 나타내고 있으며, 이것이 감사 중 집계한 다른 왜곡표시들과 합쳐졌을 때 중요할 수 있는 경우\n\n2. 감사 중 집계한 왜곡표시의 합계가 중요성에 근접하는 경우","keywords":["전반감사전략","감사계획","수정","결정","식별된 왜곡표시","성격","상황","다른","왜곡표시","가능성","합쳐","중요","합계","중요성","근접"],"unit":"9"},{"title":"왜곡표시를 집계한 경우 감사절차","criteria":"감사인은 법규상 금지되지 않은 한 감사 중 집계한 모든 왜곡표시에 대하여 적합한 수준의 경영진과 1. 적시에 커뮤니케이션하여야 한다. 또한 감사인은 경영진에게 이러한 왜곡표시를 2. 수정할 것을 요청하여야 한다.","keywords":["법규","금지","경영진","적시","커뮤니케이션","수정","요청"],"unit":"9"},{"title":"왜곡표시에 대하여 (왜곡표시를 평가하고 필요한 조치를 취할 수 있는 책임과 권한을 가진) 적절한 수준의 경영진과 적시에 커뮤니케이션함으로써 얻을 수 있는 효과는 무엇인가?","criteria":"1. 경영진이 거래유형, 계정잔액 및 공시가 왜곡표시 되었는지를 평가하게 한다\n\n2. 경영진이 동의하지 않는 경우, 감사인에게 이것을 알리고 필요한 조치를 취할 수 있게 한다","keywords":["경영진","왜곡표시","평가","경영진","동의","감사인","조치"],"unit":"9"},{"title":"감사인이 경영진과 커뮤니케이션한 왜곡표시 등 모든 왜곡표시를 경영진에게 수정하게 함으로써 얻을 수 있는 효과는 무엇인가?","criteria":"1. 정확한 회계장부와 회계기록을 유지할 수 있게 한다\n\n2. 과거의 중요하지 않은 미수정왜곡표시가 누적되어 향후 재무제표도 중요하게 왜곡표시될 위험을 감소시킨다","keywords":["정확","회계기록","유지","과거","미수정왜곡표시","누적","중요","왜곡표시","위험","감소"],"unit":"9"},{"title":"감사인의 요청으로 경영진이 왜곡표시를 수정한 경우 감사절차","criteria":"만약 감사인의 요청으로 경영진이 거래유형, 계정잔액 혹은 공시를 조사하여 그 발견된 왜곡표시들을 수정한 경우에는, 감사인은 왜곡표시가 잔존하고 있는지 여부를 결정하기 위해 추가적인 감사절차를 수행하여야 한다.\n\n감사인이 식별한 왜곡표시의 원인을 이해할 수 있도록 거래유형, 계정잔액 또는 공시를 조사하고, 이 항목들에서의 실제 왜곡표시 금액을 결정하는 절차를 수행하고, 재무제표에 적합한 수정을 하도록 감사인은 경영진에게 요청할 수 있다. 이러한 요청은 감사인이 감사표본에서 식별된 왜곡표시를 표본이 추출된 전체 모집단에 투영한 결과에 근거하여 이루어지기도 한다.","keywords":["왜곡표시","잔존","추가","감사절차"],"unit":"9"},{"title":"왜곡표시의 수정 거부 시 감사절차","criteria":"1. 경영진이 수정하지 않는 사유를 이해하여야 한다\n\n2. 재무제표 전체에 중요한 왜곡표시가 없는지 여부를 평가할 때 그 사유를 고려하여야 한다","keywords":["경영진","사유","이해","재무제표","전체","중요","왜곡표시","평가","고려"],"unit":"9"},{"title":"미수정왜곡표시의 영향 평가 전 수행해야 할 감사절차","criteria":"1. 감사인은 미수정왜곡표시의 영향을 평가하기 전에, 중요성이 기업의 실제 재무결과의 관점에서도 여전히 적합한지 여부를 재평가하여야 한다\n\n2. 중요성을 재평가한 결과 중요성 금액이 작아진 경우에는 수행중요성과 추가감사절차의 성격, 시기 및 범위가 적합한지 여부를 다시 고려하여야 한다","keywords":["중요성","실제","재무결과","재평가","중요성","작아진","수행중요성","추가감사절차","다시 고려"],"unit":"9"},{"title":"미수정왜곡표시의 중요성을 평가할 때 고려하는사항","criteria":"1. 특정 거래유형, 계정잔액 혹은 공시 그리고 재무제표 전체와 관련된 왜곡표시의 규모와 성격, 그리고 그러한 왜곡표시가 발생된 특정 상황\n\n2. 과거 보고기간에 관련된 미수정왜곡표시가 관련 거래유형, 계정잔액 또는 공시 그리고 재무제표 전체에 미치는 영향","keywords":["규모","성격","상황","과거","미수정왜곡표시","영향"],"unit":"9"},{"title":"미수정왜곡표시 관련 서면진술에 포함될 사항","criteria":"1. 미수정사항들은 해당 서면진술에 요약되어 포함되거나 첨부되어야 한다\n\n2. 경영진에게 이들이 미수정왜곡표시가 개별적으로 또는 집합적으로 재무제표 전체에 중요하지 않다고 믿는지 여부에 대한 서면진술을 요청","keywords":["서면진술","포함","첨부","경영진","미수정왜곡표시","중요","믿는지 여부","서면진술"],"unit":"9"},{"title":"서면진술의 정의","criteria":"서면진술이란 특정 사항을 확인하거나 다른 감사증거를 뒷받침하기 위하여, 경영진이 감사인에게 제공하는 서면진술을 말한다. 따라서 재무제표, 재무제표 내 경영진주장, 이를 뒷받침하는 장부와 기록은 서면진술에 포함되지 아니한다.","keywords":["경영진","제공","서면진술","재무재표","장부","포함","아니한다"],"unit":"9"},{"title":"감사증거로서 서면진술","criteria":"서면진술이 비록 필요감사증거를 제공하지만, 서면진술이 다루는 그 어떠한 사항에 대해서도 서면진술 그 자체는 충분하고 적합한 감사증거를 제공하지 않는다. 뿐만 아니라, 신뢰할 수 있는 서면진술을 경영진이 제공했다는 사실이 경영진의 책임완수 또는 특정 경영진주장에 대하여 감사인이 입수하는 다른 감사증거의 성격이나 범위에 영향을 미치는 것은 아니다.","keywords":["서면진술","자체","충분","적합","감사증거","제공","않는다","경영진","책임","다른 감사증거","영향","아니다"],"unit":"9"},{"title":"필수 서면진술","criteria":"1. 재무제표 작성: 경영진이 해당 재무보고체계에 따라 재무제표를 작성할 책임을 완수하였다\n\n2. 제공된 정보 및 거래의 완전성: 경영진은 감사업무조건에서 합의한 대로 모든 관련 정보를 감사인에게 제공하고 접근하게 하였다. 또한 경영진은 모든 거래를 기록하고 재무제표에 반영하였다","keywords":["해당 재무보고체계","재무제표","작성","모든","정보","제공","접근","거래","재무제표","반영"],"unit":"9"},{"title":"감사보고서일자를 정할 때 적용되는 원칙","criteria":"1. 발행된 감사보고서를 뒷받침하는데 충분하고 적합한 감사증거를 수집한 날보다 빨라서는 안 된다\n\n2. 공시할 재무제표를 이사회가 승인한 날보다 빨라서는 안 된다\n\n3. 감사보고서일은 품질관리업무검토일보다 빨라서는 안 된다\n\n4. 감사보고서일은 서면진술일보다 빨라서는 안 된다\n\n5. 감사보고서일 후 최종감사파일의 취합을 완료하는 것은 새로운 감사절차의 수행이나 새로운 결론의 도출과는 관계없는 행정적 절차이다. 따라서 감사보고서일에 영향을 미치지 아니한다","keywords":["충분","적합","감사증거","승인","품질관리업무검토일","서면진술일","최종감사파일","취합"],"unit":"9"},{"title":"서면진술의 대상기간을 서술하시오.","criteria":"서면진술은 감사보고서에서 언급된 모든 재무제표와 기간을 대상으로 한다.","keywords":["감사보고서","언급","모든","재무제표","기간"],"unit":"9"},{"title":"서면진술일은 언제로 하여야 하는가?","criteria":"서면진술일은 가능한 재무제표에 대한 감사보고서일에 실행가능한 가장 근접한 날로 하되, 감사보고서일보다 늦지 않아야 한다.","keywords":["감사보고서일","근접","늦지 않아야"],"unit":"9"},{"title":"서면진술일이 감사보고서일과 같을 수는 있지만 감사보고서일보다 늦을 수는 없는 이유?","criteria":"서면진술은 감사인이 수집하는 감사증거 중 가장 최후에 수집하는 필요 감사증거이다. 감사인은 감사증거를 수집 완료한 후에 감사의견을 표명할 수 있기 때문에 감사증거수집완료일인 감사보고서일은 서면진술일보다 빠를 수 없다.","keywords":["최후","필요","감사증거"],"unit":"9"},{"title":"현재의 경영진이 감사보고서에 언급된 모든 기간 동안 재직하지 않았을 경우에도 현재의 경영진에게 관련된 전체 기간을 포함하는 서면진술을 요청해야 하는 이유는 무엇인가?","criteria":"감사보고서에 언급된 모든 기간 동안 재직하지 않았다는 사실이 재무제표 전체에 대한 이들의 책임을 경감하지는 않기 때문이다.","keywords":["재직","사실","책임","경감"],"unit":"9"},{"title":"서면진술 거부할 경우 감사절차","criteria":"1. 해당 사항을 경영진과 토의함\n\n2. 경영진의 성실성을 다시 평가하고, 경영진 진술 및 감사증거일반의 신뢰성에 미칠 수 있는 영향을 평가함\n\n3. 감사의견에 미칠 가능성이 있는 영향의 결정을 포함한 적절한 조치를 취함","keywords":["경영진","토의","경영진","성실성","평가","진술","감사증거","신뢰성","영향","감사의견","영향","결정"],"unit":"9"},{"title":"필수 서면진술 미제공 시 감사보고-경영진 책임에 관한 서면진술","criteria":"다음 중 어느 하나와 같이 필수 서면진술에 의문이 있거나 서면진술을 거부하는 경우, 감사인은 재무제표에 대한 의견표명을 거절하여야 한다.\n\n1. 경영진의 성실성에 대해서, 재무제표의 작성과 제공된 정보 및 거래의 완전성에 대한 서면진술을 신뢰할 수 없을 정도로 의문이 있다고 감사인이 결론을 내린 경우\n\n2. 경영진이 재무제표의 작성과 제공된 정보 및 거래의 완전성에 대한 서면진술을 제공하지 않는 경우","keywords   <script>
    /* DATA will be loaded from #data-json */
    const KEY = "keyword_typer_state_v2_pretendard_v6";
    const qs = s => document.querySelector(s);
    const el = id => document.getElementById(id);

    const QUIZ_DATA = JSON.parse(document.getElementById('quiz-data-json').textContent);
    let isQuizMode = false;
    let quizIndex = 0;

    let state = null;
    try { state = JSON.parse(localStorage.getItem(KEY)) || null; } catch(e) {}
    if (!state || !Array.isArray(state.order) || state.order.length !== DATA.length) {
      const baseOrder = Array.from(DATA.keys());
      state = {
        order: baseOrder.slice(),  // 현재 화면에 쓰는 순서
        answers: {},
        stats: {},
        saved: {},                 // 🔹 { [questionId]: true } 형태
        fullOrder: baseOrder       // 🔹 전체 390문제 기본 순서
      };
   } else {
     // 예전 state에 saved / fullOrder 없던 경우 대비
     if (!state.saved) state.saved = {};
     if (!state.fullOrder || !Array.isArray(state.fullOrder) || state.fullOrder.length !== DATA.length) {
       state.fullOrder = Array.from(DATA.keys());
     }
   }

    const total = DATA.length;
    el('total').textContent = String(total);
    el('tot').textContent = String(total);

    let pos = 0;
    function updateCountsFromState() {
      if (!window.state || !Array.isArray(state.order)) return;
      const total = state.order.length;
      const curIndex = total ? (pos + 1) : 0;
      const setText = (id, val) => { const el = document.getElementById(id); if (el) el.textContent = String(val); };
      setText('total', total);
      setText('tot', total);
      setText('cur', curIndex);
    }
    function save() { localStorage.setItem(KEY, JSON.stringify(state)); }

    function norm(s) { return (s ?? "").toString().trim(); }
    function tokenizeKeywords(arr) { return (arr || []).map(k => k.trim()).filter(k => k.length > 0); }
    function criteriaToHtml(text) {
      if (!text) return "<p>(기준서 내용 없음)</p>";
      const lines = text.split(/\r?\n/).map(s => s.trim()).filter(Boolean);
      if (lines.length <= 1) return `<p>${escapeHtml(text)}</p>`;
      return "<ul>" + lines.map(s => `<li>${escapeHtml(s)}</li>`).join("") + "</ul>";
    }
    // 단원 추출 함수
    function getUnit(rec) {
      const r = rec || {};
      if (typeof r.unit !== 'undefined' && r.unit !== null && r.unit !== '') return String(r.unit);
      if (typeof r['단원'] !== 'undefined' && r['단원'] !== null && r['단원'] !== '') return String(r['단원']);
      const t = (r.title || '').toString();
      const m = t.match(/(\d+)\s*단원/);
      if (m) return m[1];
      return '4'; // fallback
    }
    
    function escapeHtml(s) { return (s ?? '').toString().replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#39;"}[m])); }

    function renderList() {
      const rows = state.order.map((id, idx) => {
        const r = DATA[id];
        const st = state.stats[id] || {}; const rate = Number.isFinite(st.score) ? st.score : (st.tries ? Math.round(100 * st.corrects / st.tries) : 0);
        return `<tr>
          <td style="width:52px; color:#cfd5dd;">#${idx+1}</td>
          <td>${escapeHtml(r.title || '(제목 없음)')}</td>
          <td style="width:72px; text-align:right; color:#98a1ab;">${rate}%</td>
        </tr>`;
      }).join("");
      el('list').innerHTML = `<table class="table">
        <thead><tr><th>번호</th><th>제목</th><th style="text-align:right;">정답률</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
    }

    function go(i) {
  if (isQuizMode) {
    // 🔹 퀴즈 모드에서의 이동
    quizIndex = Math.max(0, Math.min(i, QUIZ_DATA.length - 1));
    const rec = QUIZ_DATA[quizIndex];
    if (!rec) return;

    // 제목/기존 필드 초기화
    el('title').textContent = rec.title || "(제목 없음)";
    el('criteria').innerHTML = '';
    const answerEl = el('answer');
    if (answerEl) answerEl.value = '';
    const resEl = el('result');
    if (resEl) { resEl.style.display = 'none'; resEl.innerHTML = ''; resEl.textContent = ''; }
    const kwWrap = el('kwWrap');
    if (kwWrap) kwWrap.innerHTML = "";
    const quizKwWrap = document.getElementById('quizKwWrap');
    if (quizKwWrap) quizKwWrap.innerHTML = '';
    const quizRevealBtn = document.getElementById('quizRevealBtn');
    if (quizRevealBtn) quizRevealBtn.textContent = '키워드 보기';

    renderQuizQuestion(quizIndex);
    updateQuizHeaderForQuiz();
    renderQuizList();
    return;
  }

  // 🔹 기본 모드 이동
  pos = Math.max(0, Math.min(i, state.order.length - 1));
  const id = state.order[pos];
  const rec = DATA[id];
  el('cur').textContent = String(pos+1);
  el('title').textContent = rec.title || "(제목 없음)";
  el('criteria').innerHTML = '';
  el('answer').value = '';
  el('result').style.display = 'none';
  el('kwWrap').innerHTML = "";
  el('answer').focus();

  updateSaveButton();
}


    
function grade() {
  const id = state.order[pos];
  const rec = DATA[id];
  const input = norm(el('answer').value);
  state.answers[id] = input;
  const text = input.toLowerCase();

  const keywords = tokenizeKeywords(rec.keywords || []);
  const hits = [], misses = [];
  for (const kw of keywords) {
    const k = kw.toLowerCase();
    if (!k) continue;
    (text.includes(k) ? hits : misses).push(kw);
  }

  const res = el('result');
  const normalizeStrict = (s) => (s ?? "").toString()
        .toLowerCase()
        .replace(/\s+/g, "")
        .replace(/[^\p{L}\p{N}]/gu, "");
  const critMatch = rec.criteria ? (normalizeStrict(input) === normalizeStrict(rec.criteria)) : false;

  
  // 정답률(덮어쓰기) 계산: 0/50/75/100
  let score = 0;
  if (hits.length === 0) score = 0;
  else if (misses.length > 0) score = 50;
  else if (!critMatch) score = 75;
  else score = 100;
  state.stats[id] = { score };
  save();

  // 🔹 로그인되어 있으면 Supabase에도 저장
  if (typeof saveUserStatForCurrentUser === 'function') {
    saveUserStatForCurrentUser(id, score);
  }

  if (typeof renderList === 'function') {
    try { renderList(); } catch (e) { console.warn(e); }
  }

let msg = "";
  if (hits.length === 0) {
    res.className = 'result bad';
    msg = "❌ 키워드가 모두 빠져있어요 😭";
  } else if (misses.length > 0) {
    res.className = 'result bad';
    msg = "🔶 일부 키워드가 빠져있어요!";
  } else if (!critMatch) {
    res.className = 'result ok';
    msg = "✔️ 키워드가 모두 포함되었어요! 완벽에 도전해 볼까요?";
  } else {
    res.className = 'result ok';
    msg = "✅ 완벽하게 암기하셨어요!";
  }
  res.innerHTML = msg;
  res.style.display = 'block';

  const kwHTML = keywords.map(kw => {
    const ok = hits.includes(kw);
    return `<span class="kw ${ok ? 'hit' : 'missing'}">${escapeHtml(kw)}</span>`;
  }).join("");
  const critHTML = '<div class="criteria" style="margin-top:12px; padding-top:8px; border-top:1px solid #ccc;"><b>정답:</b><br>' + criteriaToHtml(rec.criteria || "") + '</div>';
  el('kwWrap').innerHTML = kwHTML + critHTML;

  renderList();
  return (misses.length === 0) && critMatch;
}

function collectQuizAnswerText() {
  const blanks = Array.from(document.querySelectorAll('.quiz-blank'));
  const values = blanks
    .map(el => {
      // input/textarea 대비도 해두고, span일 때는 textContent 사용
      const v = ('value' in el ? el.value : el.textContent) || '';
      return v.trim();
    })
    .filter(v => v.length > 0);

  return values.join(' ');
}

function renderQuizQuestion(index) {
  const rec = QUIZ_DATA[index];
  if (!rec) return;

  quizIndex = index;

  // 제목 보정
  const titleEl = document.getElementById('title');
  if (titleEl) {
    titleEl.textContent = rec.title || "(제목 없음)";
  }

  const raw = (rec.quiz || '').toString();
  let blankCounter = 0;

  // escapeHtml 후 언더바를 contenteditable span으로 치환
const escaped = escapeHtml(raw);
const html = escaped.replace(/_{2,}/g, function () {
  blankCounter += 1;
  return (
    '<span class="quiz-blank" contenteditable="true" ' +
      'data-blank="blank-' + blankCounter + '"></span>'
  );
});

  const quizTextEl = document.getElementById('quizText');
  if (quizTextEl) {
    quizTextEl.innerHTML = html;
  }

  const quizResultEl = document.getElementById('quizResult');
  if (quizResultEl) {
    quizResultEl.style.display = 'none';
    quizResultEl.textContent = '';
  }
}

function updateQuizHeaderForQuiz() {
  const total = QUIZ_DATA.length;
  const curIndex = total ? (quizIndex + 1) : 0;
  const setText = (id, val) => {
    const el = document.getElementById(id);
    if (el) el.textContent = String(val);
  };
  setText('total', total);
  setText('tot', total);
  setText('cur', curIndex);
}

function renderQuizList() {
  const listEl = document.getElementById('list');
  if (!listEl) return;

function gradeQuiz() {
  const rec = QUIZ_DATA[quizIndex];
  if (!rec) return;

  const answerText = norm(collectQuizAnswerText());
  const quizResultEl = document.getElementById('quizResult');
  if (!quizResultEl) return;

  if (!answerText) {
    quizResultEl.className = 'result bad';
    quizResultEl.style.display = 'block';
    quizResultEl.textContent = '아직 아무것도 입력하지 않았어요.';
    return;
  }

  const keywords = tokenizeKeywords(rec.keywords || []);
  const textLower = answerText.toLowerCase();
  const hits = [];
  const misses = [];

  for (const kw of keywords) {
    const k = kw.toLowerCase();
    if (!k) continue;
    if (textLower.includes(k)) hits.push(kw);
    else misses.push(kw);
  }

  let msg = '';
  if (keywords.length && misses.length === 0) {
    quizResultEl.className = 'result ok';
    msg = '정답입니다! 🎉';
  } else if (hits.length > 0) {
    quizResultEl.className = 'result bad';
    msg = '일부 키워드는 맞았지만, 아직 빠진 내용이 있어요.';
  } else {
    quizResultEl.className = 'result bad';
    msg = '키워드가 거의 보이지 않아요. 기준서를 다시 확인해 보세요.';
  }

  quizResultEl.style.display = 'block';
  quizResultEl.textContent = msg;
}

function initUnitFilter(){
  const sel = document.getElementById('unitFilter');
  if (!sel) return;
  // 옵션 초기화
  sel.innerHTML = '<option value=\"\">전체</option>';

  const units = Array.from(new Set((DATA||[]).map(r => String(r.unit ?? r['단원'] ?? '')).filter(u => u !== '')));
  const asNum = units.every(u => !isNaN(Number(u)));
  units.sort((a,b)=> asNum ? Number(a) - Number(b) : a.localeCompare(b));

  for (const u of units) {

    opt.value = u;
    opt.textContent = String(u);
    sel.appendChild(opt);
  }

  sel.addEventListener('change', applyFilter);

  // 초기 state.order 없으면 전체로 세팅

(function(){
  function __resetCardAnswerStrict(){
    var a = document.getElementById('cardAnswer');
    var t = document.getElementById('toggleAnswerBtn');
    if (a) { a.style.display = 'none'; a.innerHTML = ''; }
    if (t) { t.textContent = '정답 보기'; }
  }

  // Wrap go() so every navigation clears card answer state
  if (typeof window.go === 'function') {
    var __origGo2 = window.go;
    window.go = function(i){
      var r = __origGo2.call(this, i);
      try { __resetCardAnswerStrict(); } catch(e){} try { if (window.__resetCardKeywords) window.__resetCardKeywords(); } catch(e){}
      return r;
    };
  } else {
    // If go isn't defined yet, set it up when available
    var obs2 = new MutationObserver(function(){
      if (typeof window.go === 'function'){
        var __origGo2 = window.go;
        window.go = function(i){
          var r = __origGo2.call(this, i);
          try { __resetCardAnswerStrict(); } catch(e){} try { if (window.__resetCardKeywords) window.__resetCardKeywords(); } catch(e){}
          return r;
        };
        obs2.disconnect();
      }
    });
    obs2.observe(document.documentElement, {childList:true, subtree:true});
  }

  // Also bind to next/prev buttons as an extra safety
  var nb = document.getElementById('nextBtn');

          if (!ok) {
            // 실패하면 롤백
            state.saved[id] = prev;
            save();
            updateSaveButton();
            alert('서버에서 저장된 문제 삭제에 실패했습니다. (Supabase 정책/스키마 확인 필요)');
          }
        }
      } else {
        // 새로 저장
        const prev = !!state.saved[id];
        state.saved[id] = true;
        save();
        updateSaveButton();

        if (typeof saveQuestionForCurrentUser === 'function') {
          const ok = await saveQuestionForCurrentUser(id);
          if (!ok) {
            // 실패하면 롤백
            if (!prev) {
              delete state.saved[id];
            } else {
              state.saved[id] = prev;
            }
            save();
            updateSaveButton();
            alert('서버에 문제를 저장하지 못했습니다. (Supabase 정책/스키마 확인 필요)');
          }
        }
      }
    });
  });
</script>

<script>
  // 이미 있으면 중복 정의 안 되게 한 번만 정의
  function isSavedQuestion(id) {
    if (!window.state || !state.saved) return false;
    return !!state.saved[id];
  }

  function updateSaveButton() {
    const btn = document.getElementById('saveQuestionBtn');
    if (!btn || !window.state || !Array.isArray(state.order) || !state.order.length) return;

    const id = state.order[pos];
    const saved = isSavedQuestion(id);

    btn.textContent = saved ? '저장된 목록에서 제거' : '이 문제 저장하기';
    btn.setAttribute('aria-pressed', saved ? 'true' : 'false');
  }

  // 문제 이동(go) 이후에 항상 버튼 상태를 맞춰주기 위해 go를 감싸줌
  (function () {
    if (typeof window.go === 'function') {
      const __origGo = window.go;
      window.go = function(i) {
        const r = __origGo.call(this, i);
        try { updateSaveButton(); } catch (e) {}
        return r;
      };
    } else {
      // go가 나중에 정의되는 경우를 대비한 옵저버
      const obs = new MutationObserver(function() {
        if (typeof window.go === 'function') {
          const __origGo = window.go;
          window.go = function(i) {
            const r = __origGo.call(this, i);
            try { updateSaveButton(); } catch (e) {}
            return r;
          };
          obs.disconnect();
        }
      });
      obs.observe(document.documentElement, { childList: true, subtree: true });
    }
  })();
</script>

<script>

// =============================
//  나만의 리스트: Supabase 연동
// =============================

async function saveQuestionForCurrentUser(questionId) {
    if (!window.supabase || !supabase.auth) {
      console.warn('supabase가 아직 초기화되지 않았습니다.');
      return false;
    }

    const qid = Number(questionId);
    if (!Number.isInteger(qid)) {
      console.warn('유효하지 않은 questionId:', questionId);
      return false;
    }

    try {
      const { data: { user }, error: userError } = await supabase.auth.getUser();
      if (userError) {
        console.error('supabase.auth.getUser error', userError);
        return false;
      }
      if (!user) {
        alert('로그인 후 사용할 수 있는 기능입니다.');
        return false;
      }

      // 단순 insert (중복 허용 안 하려면 onConflict 정책으로 처리)
      const { error } = await supabase
        .from('saved_questions')
        .insert([
          {
            user_id: user.id,
            question_id: qid,
            created_at: new Date().toISOString()
          }
        ]);

      if (error) {
        console.error('saveQuestionForCurrentUser error', error);
        return false;
      }

      console.log('saved_questions insert 성공', { user_id: user.id, question_id: qid });
      return true;
    } catch (e) {
      console.error('saveQuestionForCurrentUser exception', e);
      return false;
    }
  }

  async function removeSavedQuestionForCurrentUser(questionId) {
    if (!window.supabase || !supabase.auth) {
      console.warn('supabase가 아직 초기화되지 않았습니다.');
      return false;
    }

    const qid = Number(questionId);
    if (!Number.isInteger(qid)) {
      console.warn('유효하지 않은 questionId(삭제):', questionId);
      return false;
    }

    try {
      const { data: { user }, error: userError } = await supabase.auth.getUser();
      if (userError) {
        console.error('supabase.auth.getUser error', userError);
        return false;
      }
      if (!user) {
        alert('로그인 후 사용할 수 있는 기능입니다.');
        return false;
      }

      const { error } = await supabase
        .from('saved_questions')
        .delete()
        .eq('user_id', user.id)
        .eq('question_id', qid);

      if (error) {
        console.error('removeSavedQuestionForCurrentUser error', error);
        return false;
      }

      console.log('saved_questions delete 성공', { user_id: user.id, question_id: qid });
      return true;
    } catch (e) {
      console.error('removeSavedQuestionForCurrentUser exception', e);
      return false;
    }
  }

  async function loadSavedQuestionsForCurrentUser() {
    if (!window.supabase || !supabase.auth) return;
    try {
      const { data: { user }, error: userError } = await supabase.auth.getUser();
      if (userError || !user) return;

      const { data, error } = await supabase
        .from('saved_questions')
        .select('question_id')
        .eq('user_id', user.id);

      if (error) {
        console.error('loadSavedQuestionsForCurrentUser error', error);
        return;
      }

      if (!window.state) return;
      state.saved = state.saved || {};

      // 전부 false로 초기화
      for (const key of Object.keys(state.saved)) {
        state.saved[key] = false;
      }

      // DB에 있는 것들만 true로 세팅
      for (const row of (data || [])) {
        const qid = Number(row.question_id);
        if (!Number.isNaN(qid) && qid >= 0 && qid < DATA.length) {
          state.saved[qid] = true;
        }
      }

      // 로컬 저장 + 버튼/목록 갱신
      save();
      updateSaveButton();
      if (typeof renderList === 'function') renderList();
    } catch (e) {
      console.error('loadSavedQuestionsForCurrentUser exception', e);
    }
  }
</script>
